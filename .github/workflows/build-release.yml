name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.1.1)'
        required: true
        default: '1.1.1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-mac:
    name: macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS package
        env:
          APPLE_ID: ${{ secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.arch }}" = "x64" ]; then
            npx electron-builder --mac dmg zip --x64
          else
            npx electron-builder --mac dmg zip --arm64
          fi
        shell: bash

      - name: Rename artifacts for non-code-signed builds
        run: |
          if [ "${{ secrets.APPLE_ID }}" = "" ]; then
            echo "No Apple ID — marking artifacts as unsigned"
            for f in dist/*.dmg; do
              base="$(basename "$f" .dmg)"
              mv "$f" "dist/${base}-unsigned.dmg"
              [ -f "$f.blockmap" ] && mv "$f.blockmap" "dist/${base}-unsigned.dmg.blockmap"
            done
          fi
        shell: bash

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.zip
            dist/*.zip.blockmap
            dist/latest-mac.yml
          retention-days: 7

  build-win:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win
        shell: bash

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            dist/Mineradio-*-Setup.exe
            dist/*.blockmap
            dist/latest.yml
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4

      - name: Organize artifacts
        run: |
          mkdir -p release-assets
          find . -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.zip' -o -name '*.blockmap' -o -name 'latest*.yml' \) \
            -not -path './release-assets/*' -exec mv {} release-assets/ \;
          ls -la release-assets/

      - name: Generate SHA256SUMS
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt 2>/dev/null || true
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mineradio ${{ github.ref_name }}"
          body: |
            ## Mineradio ${{ github.ref_name }}

            ### macOS
            - `Mineradio-*-arm64.dmg`
            - `Mineradio-*-x64.dmg`
            - macOS 首次打开时，请**右键 → 打开**以绕过 Gatekeeper

            ### Windows
            - `Mineradio-*-Setup.exe`

            ### 校验
            见 SHA256SUMS.txt
          files: release-assets/*
          draft: false
          prerelease: false
